<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        h1 {
            font-size: 1.6rem;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 18px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: #4f8ef7;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .row > div { flex: 1; }

        button {
            width: 100%;
            padding: 12px;
            background: #4f8ef7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }

        button:hover { background: #3a7de0; }
        button:disabled { background: #aac4f5; cursor: not-allowed; }

        .result {
            margin-top: 24px;
            padding: 16px;
            background: #f7f9ff;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .result .amount {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .result .rate {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        .error {
            margin-top: 16px;
            padding: 12px;
            background: #fff0f0;
            border-radius: 8px;
            color: #c0392b;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }

        .footer {
            margin-top: 24px;
            font-size: 0.75rem;
            color: #bbb;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Currency Converter</h1>
    <p class="subtitle">Live rates via exchangerate-api.com</p>

    <label for="amount">Amount</label>
    <input type="number" id="amount" placeholder="100" min="0" value="1">

    <div class="row">
        <div>
            <label for="from">From</label>
            <select id="from"></select>
        </div>
        <div>
            <label for="to">To</label>
            <select id="to"></select>
        </div>
    </div>

    <button id="convertBtn" onclick="convert()" disabled>Loading...</button>

    <div class="result" id="result">
        <div class="amount" id="resultAmount"></div>
        <div class="rate" id="resultRate"></div>
    </div>

    <div class="error" id="error"></div>

    <div class="footer">AWS DevOps Portfolio &mdash; Currency Converter</div>
</div>

<script>
    const CURRENCIES = [
        'USD','EUR','GBP','JPY','CAD','AUD','CHF','CNY','INR','MXN',
        'BRL','KRW','SGD','HKD','NOK','SEK','DKK','NZD','ZAR','AED'
    ];

    let apiKey = null;

    // Fetch API key from backend on page load
    async function init() {
        try {
            const res = await fetch('/api/config');
            const data = await res.json();
            apiKey = data.apiKey;

            // Populate currency dropdowns
            const from = document.getElementById('from');
            const to = document.getElementById('to');
            CURRENCIES.forEach(c => {
                from.innerHTML += `<option value="${c}">${c}</option>`;
                to.innerHTML   += `<option value="${c}">${c}</option>`;
            });
            from.value = 'USD';
            to.value   = 'EUR';

            document.getElementById('convertBtn').disabled = false;
            document.getElementById('convertBtn').textContent = 'Convert';
        } catch (e) {
            showError('Failed to load configuration. Please refresh.');
        }
    }

    async function convert() {
        const amount = parseFloat(document.getElementById('amount').value);
        const from   = document.getElementById('from').value;
        const to     = document.getElementById('to').value;

        if (!amount || amount <= 0) {
            showError('Please enter a valid amount.');
            return;
        }

        hideError();
        hideResult();

        const btn = document.getElementById('convertBtn');
        btn.disabled = true;
        btn.textContent = 'Converting...';

        try {
            const url = `https://v6.exchangerate-api.com/v6/${apiKey}/pair/${from}/${to}/${amount}`;
            const res  = await fetch(url);
            const data = await res.json();

            if (data.result === 'success') {
                const converted = data.conversion_result.toFixed(2);
                const rate      = data.conversion_rate.toFixed(6);
                document.getElementById('resultAmount').textContent =
                    `${amount} ${from} = ${converted} ${to}`;
                document.getElementById('resultRate').textContent =
                    `1 ${from} = ${rate} ${to}`;
                showResult();
            } else {
                showError('Conversion failed. Please try again.');
            }
        } catch (e) {
            showError('Network error. Please check your connection.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Convert';
        }
    }

    function showResult() {
        document.getElementById('result').style.display = 'block';
    }

    function hideResult() {
        document.getElementById('result').style.display = 'none';
    }

    function showError(msg) {
        const el = document.getElementById('error');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hideError() {
        document.getElementById('error').style.display = 'none';
    }

    init();
</script>
</body>
</html>
